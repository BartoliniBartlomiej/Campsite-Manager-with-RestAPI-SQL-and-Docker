name: Automatyczne Testy (Pytest)

# Kiedy GitHub ma uruchomić ten skrypt?
on:
  push:
    branches: [ "main", "master" ] # Przy każdym pushu na główną gałąź
  pull_request:
    branches: [ "main", "master" ]

jobs:
  testowanie:
    runs-on: ubuntu-latest # Odpal to na najnowszym darmowym Linuxie

    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Instalacja Pythona 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # Widziałem w logach, że używasz 3.12!

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn sqlalchemy pydantic httpx pytest requests pandas streamlit psycopg2-binary

    - name: Uruchomienie testów
      run: |
        pytest -v